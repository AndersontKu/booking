<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>御景家＿神明花 | 神明花基礎課程報名</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --brand-gold: #D4B78F; --brand-gold-dark: #A38A6A; --brand-black: #0D0C0B; --brand-text: #E8DCC4; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--brand-black); color: var(--brand-text); overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .bg-pattern { background-image: radial-gradient(circle at 2px 2px, rgba(212,183,143,0.03) 1px, transparent 0); background-size: 40px 40px; }
        .glass-panel { background: rgba(22,20,18,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(212,183,143,0.1); }
        .btn-gold { background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-dark) 100%); color:#12110F; transition: all 0.3s; cursor: pointer; }
        .btn-gold:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-line { background: #00B900; color: white; }
        .skeleton { background: linear-gradient(90deg, #1a1814 25%, #262219 50%, #1a1814 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .error-msg { color:#ff4d4d; font-size:12px; display:none; margin-top:5px; }
        .visible { display:block; }
    </style>
</head>
<body class="bg-pattern min-h-screen">
    <nav class="sticky top-0 z-50 bg-[#0D0C0B]/80 backdrop-blur-xl border-b border-[#2A251B]/50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border border-[#D4B78F]/40 flex items-center justify-center rotate-45"><span class="text-[#D4B78F] -rotate-45 font-bold">御</span></div>
                <h1 class="text-lg font-serif tracking-widest text-[#D4B78F]">御景家</h1>
            </div>
            <a href="https://linevoom.line.me/user/_dbgtYOPJUTMZlbNa9Mm_f8TqVzqo-BymL6uHW1M" target="_blank" class="text-[10px] tracking-widest text-[#A39171] hover:text-[#D4B78F] transition-all">
                <i class="fa-brands fa-line text-sm"></i> 加入官方帳號
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-12 pb-24">
        <header class="text-center mb-12">
            <h2 id="hero-title" class="text-3xl font-serif tracking-widest text-[#D4B78F] mb-4">神明花基礎課程</h2>
            <div class="w-12 h-1 bg-[#D4B78F]/30 mx-auto"></div>
        </header>

        <div class="glass-panel rounded-3xl p-8 md:p-12 shadow-2xl">
            <form id="bookingForm" novalidate class="space-y-8">
                <div class="space-y-2">
                    <label class="text-xs tracking-widest text-[#8A8068] uppercase">姓名 / Name</label>
                    <input type="text" name="name" id="reg-name" required class="w-full bg-[#171512] border border-[#2A251B] rounded-xl px-5 py-4 text-sm focus:border-[#D4B78F] outline-none" placeholder="請輸入中文全名">
                    <p class="error-msg" id="err-name">請填寫姓名</p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs tracking-widest text-[#8A8068] uppercase">聯絡電話 / Phone</label>
                    <input type="tel" name="phone" id="reg-phone" required class="w-full bg-[#171512] border border-[#2A251B] rounded-xl px-5 py-4 text-sm focus:border-[#D4B78F] outline-none" placeholder="09xxxxxxxx">
                    <p class="error-msg" id="err-phone">請填寫正確的手機格式 (10 碼)</p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs tracking-widest text-[#8A8068] uppercase">電子郵件 / Email</label>
                    <input type="email" name="email" id="reg-email" required class="w-full bg-[#171512] border border-[#2A251B] rounded-xl px-5 py-4 text-sm focus:border-[#D4B78F] outline-none" placeholder="用於寄送確認信">
                    <p class="error-msg" id="err-email">請填寫正確的 Email 格式</p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs tracking-widest text-[#8A8068] uppercase">目前場次資訊 / Course Info</label>
                    <div id="course-display" class="bg-[#2A251B]/30 rounded-xl px-5 py-4 text-sm text-[#D4B78F] border border-[#D4B78F]/10">載入中...</div>
                </div>

                <input type="hidden" name="utm_source" id="utm_source">
                <input type="hidden" name="utm_medium" id="utm_medium">
                <input type="hidden" name="utm_campaign" id="utm_campaign">

                <button type="submit" id="submitBtn" class="w-full btn-gold py-5 rounded-2xl text-sm font-bold tracking-[0.4em] uppercase shadow-lg">確認提交報名</button>
            </form>
        </div>
    </main>

    <div id="success-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/95"></div>
        <div class="bg-[#0D0C0B] border border-[#D4B78F]/30 rounded-3xl p-10 max-w-md w-full relative text-center shadow-2xl">
            <div class="w-16 h-16 bg-[#D4B78F] rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-check text-[#0D0C0B] text-2xl"></i>
            </div>
            <h3 id="modal-title" class="text-2xl font-serif text-[#D4B78F] mb-4">報名已受理</h3>
            <p id="modal-desc" class="text-sm text-[#A39171] leading-loose mb-8"></p>
            
            <div class="space-y-3">
                <a href="https://linevoom.line.me/user/_dbgtYOPJUTMZlbNa9Mm_f8TqVzqo-BymL6uHW1M" class="block w-full btn-line py-4 rounded-xl text-sm font-bold tracking-widest">
                    <i class="fa-brands fa-line mr-2"></i> 立即加入官方 LINE
                </a>
                <button onclick="location.reload()" class="block w-full border border-[#2A251B] py-4 rounded-xl text-sm text-[#5C5547]">關閉視窗</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = '你的_GAS_部署連結'; // <--- 請務必填入你的部署網址

        // UTM 參數抓取
        const params = new URLSearchParams(window.location.search);
        document.getElementById('utm_source').value = params.get('utm_source') || '';
        document.getElementById('utm_medium').value = params.get('utm_medium') || '';
        document.getElementById('utm_campaign').value = params.get('utm_campaign') || '';

        // 載入場次資訊
        async function fetchCourseInfo() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.result === 'success') {
                    document.getElementById('course-display').textContent = `${data.courseName} | ${data.courseDate} | ${data.coursePrice}`;
                    if (data.isFull) {
                        document.getElementById('submitBtn').textContent = '目前正取已滿：登記候補';
                    }
                }
            } catch (e) {
                document.getElementById('course-display').textContent = '暫時無法載入場次，請聯繫官方 LINE';
            }
        }
        fetchCourseInfo();

        // 表單提交
        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 基礎驗證
            let isValid = true;
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;

            document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));

            if (!name) { document.getElementById('err-name').classList.add('visible'); isValid = false; }
            if (!/^09\d{8}$/.test(phone)) { document.getElementById('err-phone').classList.add('visible'); isValid = false; }
            if (!email.includes('@')) { document.getElementById('err-email').classList.add('visible'); isValid = false; }

            if (!isValid) return;

            // 檢查重複提交
            if (sessionStorage.getItem('submitted')) {
                alert('您已送出過資料，請勿重複提交。');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '處理中...';

            try {
                const fd = new FormData(form);
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const data = await res.json();

                if (data.result === 'duplicate') {
                    alert('此資料已報名過，請勿重複提交。');
                } else if (data.result === 'success') {
                    sessionStorage.setItem('submitted', 'true');
                    showModal(data.status);
                }
            } catch (err) {
                alert('提交失敗，請檢查網路狀況。');
            } finally {
                btn.disabled = false;
                btn.textContent = '確認提交報名';
            }
        });

        function showModal(status) {
            const isFull = status.includes('備取');
            document.getElementById('modal-title').textContent = isFull ? '已成功列入候補' : '報名正式成功';
            document.getElementById('modal-desc').innerHTML = isFull 
                ? '目前正取名額已滿，我們已將您列入候補名單。<br>請務必加入 LINE，有釋出名額將優先通知。' 
                : '席次已為您保留！確認信已寄出。<br>請加入官方 LINE 並回覆您的姓名，以獲取地點指引。';
            document.getElementById('success-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
